workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # set up in Codemagic UI (App Store Connect API key)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hamme.app
    scripts:
      - name: Create .env
        script: |
          cat <<EOF > .env
          API_BASE_URL=https://backend-three-kappa-24.vercel.app/api/v1
          API_BASE_URL_PROD=https://backend-three-kappa-24.vercel.app/api/v1
          APP_SCHEME=hamme
          SHARE_LINK_BASE=https://client-sigma-beryl-15.vercel.app/u
          APP_HOST=client-sigma-beryl-15.vercel.app
          EOF
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Create .env
        script: |
          cat <<EOF > .env
          API_BASE_URL=https://backend-three-kappa-24.vercel.app/api/v1
          API_BASE_URL_PROD=https://backend-three-kappa-24.vercel.app/api/v1
          APP_SCHEME=hamme
          SHARE_LINK_BASE=https://client-sigma-beryl-15.vercel.app/u
          APP_HOST=client-sigma-beryl-15.vercel.app
          EOF
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug-signed, no key.properties present yet)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk